<html>
<head>
	<meta charset="utf-8">
	<title>Aula 3 Formulário</title>
	<script type="text/javascript">
		function validar(){ //Para criar uma função, nesse caso "valiadar"
			var nome = form1.nome.value;
			var email = form1.email.value;
			var senha = form1.senha.value;
			var conf = form1.conf_senha.value;

			if (nome == ""){
				alert("Preencha o campo Nome!");
				return false; // Para que as informações não sejam enviadas/computadas.
			}


			else if (email == "" || email.indexOf("@") == -1 ) {/* ".indexOf()" - vai verificar se há na barra de pesquisa o que estiver dentro do parenteces, no caso se há @, e o -1 é para dizer que se nao tiver nenhum @ irá executar  */
				alert("Preencha o campo Email Corretamente!");
				return false;
			}

			else if (senha.length < 4 || senha.length > 8) { 
			/* "||" - significa "ou"
			   ".length" - Vai converter a quantidade de caracteres inseridas em numeros. 
			 */
				alert("Digite uma Senha de 4 a 8 Caracteres!!!!");
				return false;
			}

			else if (conf != senha) {
				alert("Senhas não conferem!");
				return false;
			}

		}
	</script>
</head>
<body bgcolor="lightskyblue">

	<form name="form1" method="post">
		<label>Nome:</label>
		<input type="text" name="nome"><br><br>
		<label>Email:</label>
		<input type="text" name="email"><br><br>
		<label>Senha:</label>
		<input type="password" name="senha"><br><br>
		<label>Confirmar Senha:</label>
		<input type="password" name="conf_senha"><br><br>

		<input type="submit" onclick="return validar()">
		<!-- "onclick" - quando o botão for clicado. -->
	</form>

</body>
</html>
